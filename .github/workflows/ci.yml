name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: verify (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm typecheck

      - name: lint
        run: pnpm lint

      - name: format check
        run: pnpm format:check

      - name: test (coverage)
        run: pnpm test:coverage

      - name: duplicate code
        run: pnpm dup

      - name: unused exports / deps
        run: pnpm unused

      - name: dependency rules
        run: pnpm deps:check

      - name: secret scan
        run: pnpm secrets

      - name: security audit
        run: pnpm audit:ci

      - name: build
        run: pnpm build

      - name: package shape
        run: pnpm pack:check

      - name: effective verify (self-application)
        run: |
          if [ -n "${{ github.event.pull_request.base.ref }}" ]; then
            BASE="origin/${{ github.event.pull_request.base.ref }}"
          else
            BASE="HEAD^"
          fi
          # The `governance` PR label is the elevation surface for
          # intentional constitutional changes: a human applies the label,
          # verify prints protected-path findings in a non-gating
          # governance section instead of failing on the very change that
          # is the PR's purpose. All other findings still gate.
          FLAGS=""
          if [ "${{ contains(github.event.pull_request.labels.*.name, 'governance') }}" = "true" ]; then
            FLAGS="--governance-pr"
            echo "PR carries the 'governance' label — protected-path findings are elevated, not gating."
          fi
          echo "Verifying $(git rev-parse --short HEAD) against $BASE"
          node dist/cli.mjs verify --against "$BASE" $FLAGS
